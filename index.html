<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-bar-left">
      <span id="clock" class="clock"></span>
      <span id="date-display" class="date-display"></span>
    </div>
    <div class="top-bar-right">
      <button id="theme-toggle" class="icon-btn" title="Toggle Light/Dark mode">🌙</button>
      <button id="settings-btn" class="icon-btn" title="Settings">⚙️</button>
    </div>
  </header>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Settings</h2>
      <label>
        Your Name
        <input type="text" id="user-name-input" placeholder="Enter your name" maxlength="30" />
      </label>
      <label>
        Pomodoro Duration (minutes)
        <input type="number" id="pomodoro-minutes-input" min="1" max="120" value="25" />
      </label>
      <div class="modal-actions">
        <button id="settings-save" class="btn btn-primary">Save</button>
        <button id="settings-cancel" class="btn">Cancel</button>
      </div>
    </div>
  </div>

  <main class="dashboard">

    <!-- Greeting -->
    <section class="card greeting-card">
      <h1 id="greeting-text" class="greeting-text"></h1>
    </section>

    <!-- Focus Timer -->
    <section class="card timer-card">
      <h2 class="section-title">Focus Timer</h2>
      <div id="timer-display" class="timer-display">25:00</div>
      <div class="timer-controls">
        <button id="timer-start" class="btn btn-primary">Start</button>
        <button id="timer-stop" class="btn">Stop</button>
        <button id="timer-reset" class="btn">Reset</button>
      </div>
      <div class="timer-progress-wrap">
        <div id="timer-progress" class="timer-progress"></div>
      </div>
    </section>

    <!-- To-Do List -->
    <section class="card todo-card">
      <h2 class="section-title">To-Do List</h2>
      <div class="todo-input-row">
        <input type="text" id="todo-input" placeholder="Add a new task…" maxlength="120" />
        <button id="todo-add" class="btn btn-primary">Add</button>
      </div>
      <ul id="todo-list" class="todo-list"></ul>
    </section>

    <!-- Quick Links -->
    <section class="card links-card">
      <h2 class="section-title">Quick Links</h2>
      <div class="links-input-row">
        <input type="text" id="link-name-input" placeholder="Label" maxlength="30" />
        <input type="url" id="link-url-input" placeholder="https://…" />
        <button id="link-add" class="btn btn-primary">Add</button>
      </div>
      <div id="links-grid" class="links-grid"></div>
    </section>

  </main>

  <!-- Edit Task Modal -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Edit Task</h2>
      <input type="text" id="edit-task-input" maxlength="120" />
      <div class="modal-actions">
        <button id="edit-save" class="btn btn-primary">Save</button>
        <button id="edit-cancel" class="btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
